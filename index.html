<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>travel-world</title>
    <link href="styles.css" rel="stylesheet">
</head>

<body>

    <!-- =========================
         MAP AREA
    ========================= -->
    <div class="frame">
        <div class="content"></div>
    </div>

    <!-- =========================
         INPUT + BUTTON
    ========================= -->
    <div class="guess-box">
        <input class="country-names" type="text">
        <div id="dropdown"></div>
        <div class="guess-btn">
            <button class="guess-btn-js">GUESS</button>
        </div>
    </div>
    <div class="options">
        <button class="toggle-map enabled">Toggle map</button>
        <button class="toggle-boundary enabled">Toggle boundaries</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
